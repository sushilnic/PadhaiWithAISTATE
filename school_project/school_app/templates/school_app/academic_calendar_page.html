{% extends 'school_app/base.html' %}
{% block content %}
<style>
    :root { --primary:#1e3c72; --primary-light:#2a5298; --surface:#fff; --border:#E2E8F0; }

    .cal-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        border-radius: 12px; padding: 22px 28px; margin-bottom: 22px;
        color: white; box-shadow: 0 4px 15px rgba(30,60,114,0.3);
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .cal-header h1 { font-size:1.5rem; font-weight:700; margin:0; }
    .cal-header p  { font-size:.9rem; opacity:.9; margin:4px 0 0; }
    .btn-manage {
        background: white; color: var(--primary);
        border: none; padding: 9px 20px; border-radius: 8px;
        font-weight: 700; font-size: .9rem; text-decoration: none;
        transition: all .2s;
    }
    .btn-manage:hover { background: #e0f2fe; color: var(--primary); }

    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: .82rem; font-weight: 600; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    .calendar-container {
        text-align: center; margin: 0 auto;
        background: var(--surface); border-radius: 12px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.08); border: 1px solid var(--border); padding: 20px;
    }
    .navigation {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 16px; padding: 8px 10px;
    }
    .navigation button {
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: #fff; border: none; padding: 8px 16px; border-radius: 6px;
        cursor: pointer; font-size: 14px; font-weight: 600; transition: all .3s;
    }
    .navigation button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30,60,114,.3); }
    .current-month { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .calendar { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .calendar th { background: var(--primary); color: white; padding: 10px 4px; font-size: .82rem; }
    .calendar td {
        border: 1px solid var(--border); vertical-align: top;
        padding: 6px 5px; min-height: 80px; font-size: .82rem;
        transition: background .2s;
    }
    .calendar td:hover { background: #f0f9ff; }
    .calendar td.today { background: #eff6ff; }
    .calendar td.today .day { background: var(--primary); color: white; border-radius: 50%; width: 26px; height: 26px; display:flex; align-items:center; justify-content:center; margin: 0 auto 4px; }
    .day { font-weight: 700; color: var(--primary); margin-bottom: 3px; }
    .event {
        font-size: .72rem; padding: 2px 5px; border-radius: 4px;
        margin-top: 2px; text-align: left; line-height: 1.3;
        color: white; word-break: break-word;
    }
    @media (max-width: 640px) {
        .calendar th, .calendar td { padding: 3px 2px; font-size: .65rem; }
        .event { font-size: .6rem; }
    }
</style>

<div class="cal-header">
    <div>
        <h1>📅 Academic Calendar</h1>
        <p>{{ district.name_english }} — District Academic Schedule</p>
    </div>
    {% if can_manage %}
    <a href="{% url 'academic_calendar_manage' %}" class="btn-manage">⚙️ Manage Events</a>
    {% endif %}
</div>

<div class="container-fluid px-0">
    <div class="row justify-content-center">
        <div class="col-lg-12">

            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#1e3c72;"></div> Teaching</div>
                <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div> Exam</div>
                <div class="legend-item"><div class="legend-dot" style="background:#059669;"></div> Holiday</div>
                <div class="legend-item"><div class="legend-dot" style="background:#d97706;"></div> Meeting</div>
                <div class="legend-item"><div class="legend-dot" style="background:#6d28d9;"></div> Other</div>
            </div>

            <div class="calendar-container">
                <div class="navigation">
                    <button onclick="prevMonth()">← Previous</button>
                    <span id="currentMonth" class="current-month"></span>
                    <button onclick="nextMonth()">Next →</button>
                </div>
                <table class="calendar">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th>
                            <th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
    const events = {{ calendar_events_json|safe }};
    let currentDate = new Date();

    function renderCalendar(date) {
        const body = document.getElementById('calendar-body');
        const label = document.getElementById('currentMonth');
        body.innerHTML = '';
        const year = date.getFullYear(), month = date.getMonth();
        label.innerText = `${date.toLocaleString('default',{month:'long'})} ${year}`;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        let row = '<tr>';
        for (let i=0; i<firstDay; i++) row += '<td></td>';
        for (let day=1; day<=daysInMonth; day++) {
            const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const dayEvents = events.filter(e => fullDate >= e.start && fullDate <= e.end);
            const evHtml = dayEvents.map(e =>
                `<div class="event" style="background:${e.color};">${e.title}</div>`
            ).join('');
            row += `<td class="${fullDate===todayStr?'today':''}">
                        <div class="day">${day}</div>${evHtml}</td>`;
            if ((day + firstDay) % 7 === 0) row += '</tr><tr>';
        }
        row += '</tr>';
        body.innerHTML = row;
    }
    function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(currentDate); }
    function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(currentDate); }
    renderCalendar(currentDate);
</script>
{% endblock %}
